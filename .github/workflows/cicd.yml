name: CI/CD Pipeline

on:
  pull_request:
    branches: [ngwpc-candidate, ngwpc-release, main, nwm-release, development, release-candidate]
  push:
    branches: [ngwpc-candidate, ngwpc-release, main, nwm-release, development, release-candidate]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  NODE_VERSION: "22.17.0"
  NPM_VERSION: "10.9.2"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_base: ${{ steps.vars.outputs.image_base }}
      pr_tag: ${{ steps.vars.outputs.pr_tag }}
      commit_sha: ${{ steps.vars.outputs.commit_sha }}
      commit_sha_short: ${{ steps.vars.outputs.commit_sha_short }}
      test_image_tag: ${{ steps.vars.outputs.test_image_tag }}
    steps:
      - name: Compute image vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          ORG="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(basename "${GITHUB_REPOSITORY}")"
          IMAGE_BASE="${REGISTRY}/${ORG}/${REPO}"
          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            PR_TAG="pr-${PR_NUM}-build"
            echo "pr_tag=${PR_TAG}" >> "$GITHUB_OUTPUT"
            echo "test_image_tag=${PR_TAG}" >> "$GITHUB_OUTPUT"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            COMMIT_SHA="${GITHUB_SHA}"
            SHORT_SHA="${COMMIT_SHA:0:12}"
            echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
            echo "commit_sha_short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "test_image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.test_image_tag }}
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            NPM_VERSION=${{ env.NPM_VERSION }}

  unit-test:
    name: unit-test
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [setup, build]
    permissions:
      checks: write
      contents: read
    container:
      # Use the built image which contains all node dependencies
      image: ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.test_image_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trust Git Repository Ownership
        run: git config --global --add safe.directory /__w/ngencerf-ui/ngencerf-ui

      - name: Run unit tests and generate reports
        run: |
          # The 'test:unit' script runs Vitest and generates JUnit XML and Cobertura coverage reports.
          npm ci
          npm run test:unit
      
      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always() # Run even if previous step failed
        with:
          name: Vitest Results
          path: junit.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always() # Run even if previous step failed
        with:
          name: code-coverage-report
          path: coverage/cobertura-coverage.xml
          retention-days: 7

  sonarqube-internal:
    if: (github.event_name == 'pull_request' || github.event_name == 'push') && github.repository_owner == 'NGWPC'
    runs-on: self-hosted
    needs: [setup, build]
    continue-on-error: true
    container:
      image: sonarsource/sonar-scanner-cli
      options: --entrypoint="" --user 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: sonar-scanner -X -Dsonar.verbose=true

  codeql-scan:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [setup, build]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
      - name: Install dependencies
        run: npm ci
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  container-scanning:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [setup, build]
    steps:
      - name: Scan container
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.test_image_tag }}
          format: 'template'
          template: '@/contrib/sarif.tpl'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
